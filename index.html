<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZWAN | Premium Tech Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>

/* --- Floating Cart Logic --- */
#cart-ui.floating {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    background: rgba(56, 189, 248, 0.8) !important; /* Translucent Electric Blue */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 15px 35px rgba(56, 189, 248, 0.4);
    animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes popIn {
    0% { transform: scale(0) translateY(50px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

        /* --- Electric Blue Cart Badge --- */
#cart-ui {
    background: #38bdf8 !important; /* The Rizwan Electric Blue */
    color: #0f172a !important;      /* Deep Slate text for high contrast */
    padding: 8px 18px;
    border-radius: 50px;           /* Full pill shape */
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
    border: none;
    display: flex;
    align-items: center;
    gap: 8px;
}

#cart-ui:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
    filter: brightness(1.1);
}

/* The "Scale Up" animation when an item is added */
.cart-pop {
    transform: scale(1.2);
}

        /* --- CORE VARIABLES --- */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent: #38bdf8; 
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        [data-theme="dark"] {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-main: #f1f5f9;
            --glass-bg: rgba(15, 23, 42, 0.8);
        }

        /* --- GLOBAL STYLES --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* --- SCROLL PROGRESS --- */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            z-index: 10001;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.7);
            transition: width 0.1s ease-out;
        }

        /* --- PREMIUM GLASS HEADER --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--accent); text-decoration: none; letter-spacing: -1px; }

        .search-box {
            flex-grow: 1; max-width: 400px; margin: 0 20px;
            display: flex; background: rgba(255,255,255,0.1);
            border-radius: 50px; padding: 4px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .search-box:focus-within { background: rgba(255,255,255,0.15); box-shadow: 0 0 15px var(--accent); }
        .search-box input { background: transparent; border: none; color: white; padding: 8px 15px; width: 100%; outline: none; }

        /* --- THEME TOGGLE --- */
        .theme-btn {
            position: fixed; top: 85px; right: 25px; z-index: 9999;
            background: #1e293b; border: 1px solid #38bdf8;
            padding: 10px; border-radius: 50%; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .theme-btn:hover { transform: rotate(15deg) scale(1.1); box-shadow: 0 0 15px var(--accent); }

        /* --- GRID & CARDS --- */
        .main-content { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px; padding: 20px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }

        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px -10px rgba(56, 189, 248, 0.25); border-color: var(--accent); }

        /* --- IMAGE ZOOM EFFECT --- */
        .product-image-container { width: 100%; height: 220px; overflow: hidden; border-radius: 18px; margin-bottom: 15px; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .card:hover .product-image { transform: scale(1.1) rotate(1deg); }

        /* --- PRICING & BUTTONS --- */
        .price { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin: 10px 0 20px 0; }

        /* --- 1. MOUSE USERS (Stealth Mode) --- */
@media (hover: hover) {
    .btn {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        pointer-events: none; /* Can't click what you can't see */
    }

    /* Reveal only when the card is hovered */
    .card:hover .btn {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto; /* Now you can click it */
    }
}

/* --- 2. TOUCH USERS (Infinix/Mobile Mode) --- */
@media (hover: none) {
    .btn {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        margin-top: 15px; /* Adds space so it doesn't look cramped */
    }
}

/* --- 3. UNIVERSAL STYLING (Looks) --- */
/* This part stays outside the media queries so the button looks blue on both */
.btn {
    background: var(--accent) !important;
    color: white !important;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
}

.btn:active {
    transform: scale(0.95); /* Tactile click feel for everyone */
}

/* This keeps the header from collapsing when the cart starts floating */
.cart-wrapper {
    width: 120px; 
    height: 45px; 
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

/* Ensure the cart transitions smoothly between header and floating */
#cart-ui {
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                background-color 0.3s ease, 
                opacity 0.3s ease;
}

/* Keeps the header from jumping when the cart floats */
.cart-wrapper {
    width: 120px; 
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

/* Base style for the cart */
#cart-ui {
    background: #38bdf8;
    color: #0f172a;
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 800;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* When floating, move to the corner */
#cart-ui.floating {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    box-shadow: 0 10px 30px rgba(56, 189, 248, 0.4);
}

    </style>
</head>
<body>
    <div id="scroll-progress"></div>
    
    <button id="theme-toggle" class="theme-btn">
        <span id="theme-icon">🌙</span>
    </button>

   <header>
    <a href="#" class="logo">RIZWAN.</a>
    <div class="search-box">
        <input type="text" placeholder="Search premium tech...">
    </div>
    <div class="cart-wrapper">
        <div id="cart-ui">Cart (0)</div>
    </div>
</header>

    <div class="main-content">
        <div class="grid">
            <div class="card">
                <div class="product-image-container">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" class="product-image" alt="Headphones">
                </div>
                <h3>Studio-Pro Wireless Headphones</h3>
                <div class="price">$299.00</div>
                <button class="btn" onclick="addOne()">Add to Cart</button>
            </div>
            <div class="card">
                <div class="product-image-container">
                    <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=600" class="product-image" alt="Watch">
                </div>
                <h3>Titanium Smart Watch v2</h3>
                <div class="price">$199.00</div>
                <button class="btn" onclick="addOne()">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>

        const cartUI = document.getElementById('cart-ui');
const header = document.querySelector('header');

window.addEventListener('scroll', () => {
    const cart = document.getElementById('cart-ui');
    if (window.scrollY > 80) {
        cart.classList.add('floating');
    } else {
        cart.classList.remove('floating');
    }
});

        let count = 0;
        function addOne() {
            count++;
            document.getElementById('cart-ui').innerText = `Cart (${count})`;
            const ui = document.getElementById('cart-ui');
            ui.style.transform = "scale(1.1)";
            setTimeout(() => ui.style.transform = "scale(1)", 200);
        }

        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeIcon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeIcon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        window.onscroll = function() {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            const progressBar = document.getElementById("scroll-progress");
            if (progressBar) { progressBar.style.width = scrolled + "%"; }
        };
    </script>
</body>
</html>
