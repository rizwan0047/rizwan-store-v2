<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZWAN | Premium Tech Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- The Premium Gallery Effect --- */
.product-image-container {
    width: 100%;
    height: 220px;
    overflow: hidden; /* Important: clips the zoom! */
    border-radius: 18px;
    background: #f8fafc; /* Clean, light base */
    position: relative;
}

.product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); /* Professional fluid motion */
}

/* On card hover, zoom the image WITHOUT growing the box */
.card:hover .product-image {
    transform: scale(1.15) rotate(1deg); /* Subtle rotate adds a 3D feel */
}

/* The Glow Effect for the whole card */
.card:hover {
    box-shadow: 0 25px 50px -12px rgba(56, 189, 248, 0.25); /* Electric Blue highlight */
    transform: translateY(-8px);
    border-color: #38bdf8;
}
        /* --- Glassmorphic Search Bar --- */
.search-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px); 
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50px;
    padding: 10px 25px;
    display: flex;
    align-items: center;
    max-width: 400px;
    margin: 20px auto;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.search-container:focus-within {
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.25); /* Electric Blue Glow */
    transform: translateY(-2px);
}

/* --- The Liquid "Buy" Button --- */
.buy-btn {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.buy-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
}

.buy-btn:active {
    transform: scale(0.96);
}
        :root {
    /* Light Mode (Clean & Crisp) */
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --accent: #38bdf8; /* Electric Blue */
    --glass-bg: rgba(255, 255, 255, 0.7);
}

[data-theme="dark"] {
    /* Dark Mode (OLED & Professional) */
    --bg-color: #020617; /* Deep Midnight */
    --card-bg: #0f172a; /* Slate Blue-Gray */
    --text-main: #f1f5f9;
    --accent: #38bdf8; 
    --glass-bg: rgba(15, 23, 42, 0.8);
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    transition: background-color 0.4s ease, color 0.4s ease;
}

.card {
    background-color: var(--card-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
        /* --- PREMIUM GLASS HEADER --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--accent); text-decoration: none; letter-spacing: -1px; }

        .search-box {
            flex-grow: 1; max-width: 500px; margin: 0 20px;
            display: flex; background: rgba(255,255,255,0.1);
            border-radius: 8px; padding: 4px; border: 1px solid rgba(255,255,255,0.1);
        }

        .search-box input {
            background: transparent; border: none; color: white;
            padding: 8px 12px; width: 100%; outline: none;
        }

        /* --- STABLE GRID --- */
        .main-content { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
    background: var(--white); 
    border-radius: 24px; /* More rounded = more modern */
    padding: 20px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); /* Professional "Fluid" timing */
    border: 1px solid rgba(0,0,0,0.03); 
    display: flex; 
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

.card:hover { 
    transform: translateY(-12px) scale(1.02); 
    box-shadow: 0 20px 40px -10px rgba(56, 189, 248, 0.2); /* Blue accent glow */
    border-color: var(--accent);
}

/* Add a "Glass" reflection effect on hover */
.card::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: rotate(45deg);
    transition: 0.8s;
    pointer-events: none;
}

.card:hover::after {
    left: 120%;
}

        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 14px; margin-bottom: 15px; }

        .price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: auto;
        }

        .btn:hover { background: var(--accent); color: var(--primary); }

        #cart-ui { font-weight: 600; background: var(--accent); color: var(--primary); padding: 6px 15px; border-radius: 25px; }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; }
            .search-box { width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">RIZWAN.</a>
    <div class="search-box">
        <input type="text" placeholder="Search premium tech...">
    </div>
    <div id="cart-ui">Cart (0)</div>
</header>

<div class="main-content">
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" alt="Headphones">
            <h3>Studio-Pro Wireless Headphones</h3>
            <div class="price">$299.00</div>
            <button class="btn" onclick="addOne()">Add to Cart</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=600" alt="Watch">
            <h3>Titanium Smart Watch v2</h3>
            <div class="price">$199.00</div>
            <button class="btn" onclick="addOne()">Add to Cart</button>
        </div>
    </div>
</div>

<script>
    let count = 0;
    function addOne() {
        count++;
        document.getElementById('cart-ui').innerText = `Cart (${count})`;
        // Visual feedback
        const ui = document.getElementById('cart-ui');
        ui.style.transform = "scale(1.1)";
        setTimeout(() => ui.style.transform = "scale(1)", 200);
    }
</script>

</body>
</html>
